name: Publish Docker image to Docker Hub

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v0.1.0). Pushed alongside :latest."
        required: true
        default: v0.1.0

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Uses existing repo/org secrets:
    #   DOCKERHUB_USERNAME — Docker Hub login with push rights on earthdaily
    #   DOCKERHUB_PASSWORD — Password or Personal Access Token for that account
    env:
      IMAGE: earthdaily/methane-detection
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ inputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
